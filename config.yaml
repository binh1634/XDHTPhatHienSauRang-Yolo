# Configuration for Dental Cavity Detection System

# Dataset
dataset:
  name: "dental_xray"
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  image_size: 640
  
# YOLO Configuration
yolo:
  model_name: "yolov8m"  # Options: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
  pretrained: true
  confidence_threshold: 0.5
  iou_threshold: 0.45

# UNet Configuration
unet:
  in_channels: 1  # Grayscale X-ray
  out_channels: 1  # Binary segmentation
  features: [64, 128, 256, 512]
  depth: 4

# Training
training:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0005
  optimizer: "adam"  # Options: adam, sgd
  scheduler: "cosine"  # Options: cosine, step, exponential
  device: "cuda"  # Options: cuda, cpu
  num_workers: 4
  pin_memory: true

# Data Augmentation
augmentation:
  horizontal_flip: 0.5
  vertical_flip: 0.2
  rotation: 15
  brightness: 0.2
  contrast: 0.2
  blur: 0.1
  elastic_deform: 0.1

# Inference
inference:
  batch_size: 8
  confidence_threshold: 0.5
  save_visualizations: true
  output_format: "json"  # Options: json, xml, csv

# Paths
paths:
  data_dir: "data/"
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  models_dir: "models/"
  logs_dir: "logs/"
  outputs_dir: "outputs/"

# Logging
logging:
  level: "INFO"
  save_logs: true
  tensorboard: true
